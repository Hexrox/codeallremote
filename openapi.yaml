openapi: 3.1.0
info:
  title: Code All Remote API
  version: 1.0.0
  description: Versioned control-plane API for self-hosted coding-agent sessions.
servers:
  - url: https://car.example.invalid/api/v1
paths:
  /health:
    get:
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [ok] }
  /sessions:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Authorized session summaries.
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items: { $ref: '#/components/schemas/SessionSnapshot' }
    post:
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionSnapshot' }
        '409': { $ref: '#/components/responses/Conflict' }
  /sessions/{sessionId}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Authoritative session snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionSnapshot' }
        '404': { $ref: '#/components/responses/NotFound' }
  /sessions/{sessionId}/prompts:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string, minLength: 1, maxLength: 100000 }
      responses:
        '202': { description: Accepted for asynchronous processing. }
        '409': { $ref: '#/components/responses/Conflict' }
  /sessions/{sessionId}/events:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - name: after
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        '200':
          description: Ordered events or resync instruction.
          content:
            application/json:
              schema:
                type: object
                required: [events, next_after, resync_required]
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/DomainEvent' }
                  next_after: { type: integer, minimum: 0 }
                  resync_required: { type: boolean }
  /approvals/{approvalId}/decision:
    parameters:
      - name: approvalId
        in: path
        required: true
        schema: { type: string }
    post:
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision: { type: string, enum: [approve, deny] }
                reason: { type: string, maxLength: 2000 }
      responses:
        '200':
          description: Current approval state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }
        '409': { $ref: '#/components/responses/Conflict' }
components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 200 }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: CAR-access-token
  responses:
    NotFound:
      description: Resource not found or not visible to this actor.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Conflict:
      description: State or idempotency conflict.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
  schemas:
    CreateSessionRequest:
      type: object
      additionalProperties: false
      required: [workspace_id, adapter_id]
      properties:
        workspace_id: { type: string }
        adapter_id: { type: string }
        title: { type: string, maxLength: 200 }
    SessionSnapshot:
      type: object
      additionalProperties: false
      required: [id, workspace_id, adapter_id, state, last_sequence]
      properties:
        id: { type: string }
        workspace_id: { type: string }
        adapter_id: { type: string }
        state: { type: string }
        last_sequence: { type: integer, minimum: 0 }
        pending_approval_id: { type: [string, 'null'] }
    Approval:
      type: object
      additionalProperties: false
      required: [id, session_id, state, expires_at]
      properties:
        id: { type: string }
        session_id: { type: string }
        state: { type: string, enum: [pending, approved, denied, expired, cancelled] }
        category: { type: string }
        expires_at: { type: string, format: date-time }
    DomainEvent:
      type: object
      additionalProperties: false
      required: [type, message_id, session_id, sequence, payload]
      properties:
        type: { type: string }
        message_id: { type: string }
        session_id: { type: string }
        sequence: { type: integer, minimum: 1 }
        schema_version: { type: integer, minimum: 1, default: 1 }
        payload: { type: object }
    ApiError:
      type: object
      additionalProperties: false
      required: [code, message, request_id]
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object }
        request_id: { type: string }
