# CAR Android CI (M2-04..19 server-side gates + release blocker instrumentation).
# CI-02 fix: removed invalid `-Werror` Gradle flag; `allWarningsAsErrors=true` in build.gradle.kts.
# CI-04 fix: lint MissingClass false positive disabled in build.gradle.kts.
#
# gate: compile (warnings-as-errors via build.gradle.kts), JVM unit tests, lint, debug APK.
# instrumented: runs connectedDebugAndroidTest on a hardware-accelerated
#   emulator (release blocker per tasks/26-release-approval-blocker.md).
#
# Release evidence: the instrumented emulator job first ran green on 8538bce
# (all six methods: HomeComposeTest x2, DeepLinkGuardTest x4). This header
# touch re-triggers the workflow so the emulator is pinned to the final
# submitted commit alongside a green `ci` run.
name: android

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    name: kotlin / lint / unit / apk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: compile (warnings-as-errors configured in build.gradle.kts)
        run: ./gradlew compileDebugKotlin --no-daemon

      - name: JVM unit tests (REST/WS SDK)
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: car-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  instrumented:
    name: instrumented (emulator)
    runs-on: ubuntu-latest
    needs: gate
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Enable KVM (hardware-accelerated emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          # Verify KVM is usable; the emulator-runner fails clearly otherwise.
          ls -l /dev/kvm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          working-directory: android
          script: |
            ./gradlew connectedDebugAndroidTest --no-daemon || TEST_FAILED=1
            # Screenshot capture. Gradle uninstalls both APKs after
            # connectedDebugAndroidTest, so `run-as` right after fails with
            # "unknown package". Reinstall the (already-built) app + test APKs
            # and re-run just ScreenshotTest via `am instrument` (no gradle, so
            # no auto-uninstall), then pull the PNG the test wrote to the app's
            # internal files dir. Best-effort; never masks the gate result.
            adb install -r -t app/build/outputs/apk/debug/app-debug.apk || true
            adb install -r -t app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk || true
            adb shell am instrument -w \
              -e class io.codeallremote.car.android.ScreenshotTest \
              io.codeallremote.car.android.test/androidx.test.runner.AndroidJUnitRunner || true
            adb exec-out run-as io.codeallremote.car.android cat files/home.png > home.png || true
            if [ "$TEST_FAILED" = "1" ]; then exit 1; fi

      - name: Upload Home screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-home-screenshot
          path: android/home.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-reports
          path: |
            android/app/build/reports/androidTest/
            android/app/build/outputs/androidTest-results/
          retention-days: 14
